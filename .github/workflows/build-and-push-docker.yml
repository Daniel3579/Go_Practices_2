name: Build and Push Docker Image

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string

env:
  REPO: daniel3579/go_practices_2

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ env.REPO }}/${{ inputs.service-name }}-image:${{ github.sha }} .
        working-directory: ./${{ inputs.service-name }}
        
      - name: Push Docker image
        run: docker push ghcr.io/${{ env.REPO }}/${{ inputs.service-name }}-image:${{ github.sha }}