syntax = "proto3";

package task;

option go_package = "./gen;taskpb";

import "google/protobuf/empty.proto";
import "task_requests.proto";
import "task_responses.proto";

service TaskService {
    rpc Insert (InsertRequest) returns (SelectResponse);
    rpc Select (IdRequest) returns (SelectResponse);
    rpc SelectAll (google.protobuf.Empty) returns (SelectAllResponse);
    rpc Update (UpdateRequest) returns (SelectResponse);
    rpc Delete (IdRequest) returns (google.protobuf.Empty);
}